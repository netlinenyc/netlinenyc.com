<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" fill="none" role="img" aria-label="Abstract network diagram">
  <!-- edges -->
  <g stroke="#FFFFFF" stroke-width="1">
    <line x1="70" y1="90" x2="210" y2="60" opacity="0.25"/>
    <line x1="210" y1="60" x2="350" y2="110" opacity="0.35"/>
    <line x1="70" y1="90" x2="120" y2="230" opacity="0.3"/>
    <line x1="210" y1="60" x2="120" y2="230" opacity="0.2"/>
    <line x1="210" y1="60" x2="250" y2="200" opacity="0.4"/>
    <line x1="350" y1="110" x2="250" y2="200" opacity="0.3"/>
    <line x1="120" y1="230" x2="250" y2="200" opacity="0.45"/>
    <line x1="120" y1="230" x2="90" y2="350" opacity="0.25"/>
    <line x1="250" y1="200" x2="200" y2="340" opacity="0.3"/>
    <line x1="250" y1="200" x2="340" y2="300" opacity="0.35"/>
    <line x1="350" y1="110" x2="340" y2="300" opacity="0.2"/>
    <line x1="90" y1="350" x2="200" y2="340" opacity="0.3"/>
    <line x1="200" y1="340" x2="340" y2="300" opacity="0.25"/>
  </g>
  <!-- nodes -->
  <g fill="#FFFFFF">
    <circle cx="70" cy="90" r="5" opacity="0.7"/>
    <circle cx="210" cy="60" r="7" opacity="0.9"/>
    <circle cx="350" cy="110" r="5" opacity="0.6"/>
    <circle cx="120" cy="230" r="6" opacity="0.8"/>
    <circle cx="250" cy="200" r="9" opacity="1"/>
    <circle cx="90" cy="350" r="5" opacity="0.55"/>
    <circle cx="200" cy="340" r="6" opacity="0.75"/>
    <circle cx="340" cy="300" r="5" opacity="0.65"/>
  </g>
  <!-- node rings -->
  <g stroke="#FFFFFF" fill="none">
    <circle cx="250" cy="200" r="17" opacity="0.4"/>
    <circle cx="210" cy="60" r="13" opacity="0.3"/>
    <circle cx="120" cy="230" r="12" opacity="0.25"/>
  </g>
</svg>
