---
layout: default
---
<section class="page-head">
  <div class="container">
    <p class="eyebrow">{{ page.eyebrow }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.lede %}<p class="lede">{{ page.lede }}</p>{% endif %}
  </div>
</section>
<section class="page-body">
  <div class="container narrow">
    {{ content }}
  </div>
</section>
